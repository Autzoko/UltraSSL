# UltraSSL: DINOv2 domain-adaptive pretraining — 3D labeled ultrasound datasets
# Uses all slices as unlabeled data for SSL (labels ignored during training).
# 6 datasets: BIrads, Class2, Class3, Class4, Abus, Duying (~631K slices total).
#
# Multi-GPU training with torchrun (4-8 GPUs recommended):
#
#   # 1. Create labeled shards (run locally or on HPC):
#   python -m ultrassl.data.create_labeled_shards \
#       --config config/data_label_root_3d.json --output-dir wds/ \
#       --skip-boundary 3 --min-variance 100 --neg-stride 1
#
#   # 2. Train DINOv2 (multi-GPU):
#   torchrun --nproc_per_node=4 train_ultrassl.py \
#       --config config/ultrassl_vitb14_3d_labeled.yaml \
#       data.shard_dir=/path/to/shards
#
#   # Single GPU (debug):
#   python train_ultrassl.py --config config/ultrassl_vitb14_3d_labeled.yaml

# --- Model ---
model:
  arch: vit_base
  patch_size: 14
  pretrained: "dinov2_vitb14"       # DINOv2 pretrained on ImageNet (domain adaptation)
  drop_path_rate: 0.1               # lower than 0.3 for domain adaptation

# --- DINO loss ---
dino:
  loss_weight: 1.0
  head_n_prototypes: 65536
  head_bottleneck_dim: 256
  head_nlayers: 3
  head_hidden_dim: 2048
  koleo_loss_weight: 0.1

# --- iBOT masked patch loss ---
ibot:
  loss_weight: 1.0
  mask_sample_probability: 0.5
  mask_ratio_min_max:
    - 0.1
    - 0.5
  separate_head: false
  head_n_prototypes: 65536

# --- Teacher EMA ---
teacher:
  momentum_teacher: 0.996           # higher than DINOv2's 0.992 for domain adaptation
  final_momentum_teacher: 1.0
  warmup_teacher_temp: 0.04
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 10

# --- Optimizer ---
optim:
  epochs: 50                        # domain adaptation, not from-scratch
  base_lr: 5.0e-5                   # fine-tuning regime (DINOv2 uses 4e-3 from scratch)
  lr: 0.0                           # auto-computed from base_lr
  min_lr: 1.0e-6
  warmup_epochs: 5
  weight_decay: 0.04
  weight_decay_end: 0.3
  clip_grad: 3.0
  patch_embed_lr_mult: 0.1          # preserve pretrained patch embedding
  layerwise_decay: 0.9              # deeper layers get lower LR
  freeze_last_layer_epochs: 1
  adamw_beta1: 0.9
  adamw_beta2: 0.999

# --- Training ---
train:
  batch_size_per_gpu: 24            # 8 GPUs × 24 = 192 effective batch
  num_workers: 8
  output_dir: ./outputs/ultrassl_vitb14_3d_labeled
  OFFICIAL_EPOCH_LENGTH: 5000       # ~600K slices / (24*4 GPUs) ≈ 6250, round down
  seed: 42
  centering: "centering"

# --- Multi-crop ---
# 2 global crops (224×224) + 2 local crops (98×98)
# Note: local_crops_size=98 (7×14) ensures exact patch grid, close to 96×96.
# Local scale [0.25, 0.6] is larger than default to preserve small lesions.
crops:
  global_crops_scale:
    - 0.4
    - 1.0
  local_crops_scale:
    - 0.25                           # larger min — lesions can be very small
    - 0.6                            # larger max — capture more context
  local_crops_number: 2              # 2 local crops (user spec), saves memory for multi-GPU
  global_crops_size: 224
  local_crops_size: 98               # 98 = 7×14, divisible by patch_size

# --- Ultrasound augmentations ---
augmentation:
  # Intensity (grayscale-aware: no hue/saturation jitter, no solarize)
  brightness_jitter: 0.3
  contrast_jitter: 0.3
  gaussian_noise_std:
    - 0.01
    - 0.05
  gaussian_noise_p: 0.4
  gamma_range:
    - 0.7
    - 1.5
  gamma_p: 0.3
  vertical_flip_p: 0.3
  # Frequency-domain augmentations (FDA, spectral band, spectral dropout)
  freq_augment_p: 0.15              # conservative for ultrasound texture preservation
  fda_beta:
    - 0.01
    - 0.15
  spectral_band_magnitude: 0.3
  spectral_dropout_ratio: 0.15

# --- Data loading ---
data:
  data_root_json: config/data_label_root_3d.json
  shard_dir: "/scratch/ll5582/Data/Ultrasound/Shards"    # HPC shard path
  mode: "ssl"                        # labeled shards, SSL mode (ignore annotations)
  balance_datasets: true             # replicate smaller datasets for equal sampling
  pos_enrichment: 0.0                # 0 = use ALL slices (no negative subsampling for SSL)
  shuffle_buffer: 10000              # sample-level shuffle buffer (larger = better cross-volume mixing)
  volume_slice_stride: 1             # shards already subsampled during creation
  min_slice_entropy: 0.0
  image_extensions:
    - ".png"

# --- Checkpointing ---
checkpoint:
  save_period_epochs: 5
  max_to_keep: 5
  eval_period_iterations: 5000

# --- Diagnostics ---
diagnostics:
  embed_check_period: 500
  num_probe_images: 32
